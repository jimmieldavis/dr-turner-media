  const LB = "#F4F6FB"; // two gradients lighter than nav tab bg
  const DB = "#0A1018"; // nav bg - dark
  const M = {
    TV:         dark ? { bg:DB, text:"#9A7AB8", border:"transparent" } : { bg:LB, text:"#7A5A8A", border:"transparent" },
    Article:    dark ? { bg:DB, text:"#C07888", border:"transparent" } : { bg:LB, text:"#A05070", border:"transparent" },
    Press:      dark ? { bg:DB, text:"#B86868", border:"transparent" } : { bg:LB, text:"#904040", border:"transparent" },
    Radio:      dark ? { bg:DB, text:"#C08858", border:"transparent" } : { bg:LB, text:"#A06030", border:"transparent" },
    Policy:     dark ? { bg:DB, text:"#B09878", border:"transparent" } : { bg:LB, text:"#907050", border:"transparent" },
    Conference: dark ? { bg:DB, text:"#A89838", border:"transparent" } : { bg:LB, text:"#8A7020", border:"transparent" },
    Keynote:    dark ? { bg:DB, text:"#B08858", border:"transparent" } : { bg:LB, text:"#806040", border:"transparent" },
    Panel:      dark ? { bg:DB, text:"#A07880", border:"transparent" } : { bg:LB, text:"#705058", border:"transparent" },
    Podcast:    dark ? { bg:DB, text:"#909090", border:"transparent" } : { bg:LB, text:"#606060", border:"transparent" },
    Social:     dark ? { bg:DB, text:"#686868", border:"transparent" } : { bg:LB, text:"#484848", border:"transparent" },
  };
  return M[type] || M.Press;
};

const getCityCoords = (city) => {
  if (!city || city === "Remote" || city === "[TBD]" || city === "National" || city === "Remote / National" || city === "Virtual") return null;
  const key = city.toLowerCase().split("/")[0].trim();
  for (const [k, v] of Object.entries(CITY_COORDS)) {
    if (key.includes(k) || k.includes(key)) return v;
  }
  return null;
};

const USMap = ({ dark, t, data }) => {
  const svgRef = useRef(null);
  const [selCity, setSelCity] = useState(null);
  const [loading, setLoading] = useState(true);
  const [err, setErr] = useState(false);
  const [animDone, setAnimDone] = useState(false);

  // Build city groups - aggregate by canonical lat/lng
  const cityMap = {};
  data.forEach(m => {
    const coords = getCityCoords(m.city);
    if (!coords) return;
    const key = `${coords[0].toFixed(2)},${coords[1].toFixed(2)}`;
    if (!cityMap[key]) cityMap[key] = { lat: coords[0], lng: coords[1], city: m.city.split("/")[0].trim(), items: [] };
    cityMap[key].items.push(m);
  });
  // Sort each city's items chronologically; sort cities by earliest appearance
  const cities = Object.values(cityMap).map(c => ({
    ...c,
    items: c.items.sort((a,b) => new Date(a.date)-new Date(b.date)),
    first: c.items.reduce((e,m) => new Date(m.date)<new Date(e.date)?m:e, c.items[0]),
  })).sort((a,b) => new Date(a.first.date)-new Date(b.first.date));

  const maxCount = Math.max(1, ...cities.map(c => c.items.length));

  // State appearance counts for choropleth base
  const stateCounts = {};
  data.forEach(m => {
    const city = (m.city||"").toLowerCase();
    if (city.includes("washington, d")) stateCounts["DC"]=(stateCounts["DC"]||0)+1;
    else if (city.includes(", ny")||city.includes("new york")||city.includes("binghamton")) stateCounts["NY"]=(stateCounts["NY"]||0)+1;
    else if (city.includes(", fl")||city.includes("tallahassee")||city.includes("tampa")) stateCounts["FL"]=(stateCounts["FL"]||0)+1;
    else if (city.includes(", ma")||city.includes("boston")) stateCounts["MA"]=(stateCounts["MA"]||0)+1;
    else if (city.includes(", il")||city.includes("chicago")) stateCounts["IL"]=(stateCounts["IL"]||0)+1;
    else if (city.includes(", nv")||city.includes("las vegas")) stateCounts["NV"]=(stateCounts["NV"]||0)+1;
    else if (city.includes(", tn")||city.includes("nashville")) stateCounts["TN"]=(stateCounts["TN"]||0)+1;
    else if (city.includes(", ca")||city.includes("los angeles")||city.includes("sacramento")||city.includes("san francisco")||city.includes("palo alto")) stateCounts["CA"]=(stateCounts["CA"]||0)+1;
    else if (city.includes(", wi")||city.includes("milwaukee")||city.includes("madison")) stateCounts["WI"]=(stateCounts["WI"]||0)+1;
    else if (city.includes(", oh")||city.includes("columbus")||city.includes("dayton")||city.includes("cincinnati")) stateCounts["OH"]=(stateCounts["OH"]||0)+1;
    else if (city.includes(", ky")||city.includes("louisville")) stateCounts["KY"]=(stateCounts["KY"]||0)+1;
    else if (city.includes(", mo")||city.includes("kansas city")) stateCounts["MO"]=(stateCounts["MO"]||0)+1;
    else if (city.includes(", ga")||city.includes("atlanta")) stateCounts["GA"]=(stateCounts["GA"]||0)+1;
    else if (city.includes(", wa")||city.includes("seattle")) stateCounts["WA"]=(stateCounts["WA"]||0)+1;
    else if (city.includes(", tx")||city.includes("austin")||city.includes("el paso")) stateCounts["TX"]=(stateCounts["TX"]||0)+1;
    else if (city.includes(", la")||city.includes("new orleans")||city.includes("monroe")) stateCounts["LA"]=(stateCounts["LA"]||0)+1;
    else if (city.includes(", co")||city.includes("grand junction")) stateCounts["CO"]=(stateCounts["CO"]||0)+1;
    else if (city.includes(", az")||city.includes("phoenix")||city.includes("tucson")) stateCounts["AZ"]=(stateCounts["AZ"]||0)+1;
    else if (city.includes(", in")||city.includes("indianapolis")) stateCounts["IN"]=(stateCounts["IN"]||0)+1;
    else if (city.includes(", ut")||city.includes("salt lake")) stateCounts["UT"]=(stateCounts["UT"]||0)+1;
    else if (city.includes(", va")||city.includes("alexandria")) stateCounts["VA"]=(stateCounts["VA"]||0)+1;
  });

  const selCityItems = selCity ? (cityMap[selCity]?.items || []).sort((a,b)=>new Date(b.date)-new Date(a.date)) : [];

  useEffect(() => {
    let mounted = true;
    setLoading(true); setErr(false); setAnimDone(false); setSelCity(null);
    const ACCENT = "#69BE28";
    const W = 600, H = 360;

    const loadMap = async () => {
      try {
        // Load topojson via script tag (works in sandbox; esm dynamic import does not)
        await new Promise((resolve, reject) => {
          if (window.topojson) { resolve(); return; }
          const s = document.createElement("script");
          s.src = "https://cdnjs.cloudflare.com/ajax/libs/topojson/3.0.2/topojson.min.js";
          s.onload = resolve;
          s.onerror = reject;
          document.head.appendChild(s);
        });

        const usRaw = await fetch("https://cdn.jsdelivr.net/npm/us-atlas@3/states-10m.json").then(r=>r.json());
        if (!mounted) return;

        const states = window.topojson.feature(usRaw, usRaw.objects.states);
        const svg = d3.select(svgRef.current);
        svg.selectAll("*").remove();

        const proj = d3.geoAlbersUsa().fitSize([W, H], states);
        const path = d3.geoPath().projection(proj);

        // ── Base map ──────────────────────────────────────────────────────────
        svg.append("g").selectAll("path")
          .data(states.features)
          .join("path")
          .attr("d", path)
          .attr("fill", dark ? "#151D2E" : "#FFFFFF")
          .attr("stroke", dark ? "#5899CC" : "#7A8898")
          .attr("stroke-width", 0.6);

        if (mounted) setLoading(false);

        // ── Animate markers chronologically - Style I ─────────────────────────
        const DELAY = 65;
        cities.forEach((city, i) => {
          const coords = proj([city.lng, city.lat]);
          if (!coords) return;
          const [cx, cy] = coords;
          const key = `${city.lat.toFixed(2)},${city.lng.toFixed(2)}`;
          const n = city.items.length;
          const haloR = 5 + (n / 18) * 18;
          const haloOp = 0.15 + (n / 18) * 0.60;
          const coreR = 5;

          setTimeout(() => {
            if (!mounted) return;

            const g = svg.append("g")
              .attr("transform", `translate(${cx},${cy})`)
              .style("cursor", "pointer")
              .on("click", () => setSelCity(s => s===key ? null : key))
              .on("mouseenter", function() { d3.select(this).select("circle").attr("opacity", Math.min(haloOp + 0.15, 1)); })
              .on("mouseleave", function() { d3.select(this).select("circle").attr("opacity", haloOp); });

            // Halo - grows in size and opacity with count
            g.append("circle")
              .attr("r", 0)
              .attr("fill", ACCENT)
              .attr("opacity", haloOp)
              .transition().duration(400).ease(d3.easeQuadOut)
              .attr("r", haloR);

            // Core - always fully solid, bounces in after halo
            g.append("circle")
              .attr("r", 0)
              .attr("fill", ACCENT)
              .attr("opacity", 1)
              .transition().duration(300).delay(150).ease(d3.easeBackOut.overshoot(2.2))
              .attr("r", coreR);

            g.append("title").text(`${city.city} - ${n} appearance${n>1?"s":""}`);

            if (i === cities.length - 1) {
              setTimeout(() => { if (mounted) setAnimDone(true); }, 400);
            }
          }, i * DELAY);
        });

      } catch(e) { if (mounted) { setErr(true); setLoading(false); } }
    };
    loadMap();
    return () => { mounted = false; };
  }, [dark]);

  return (
    <div style={{ display:"flex", flexDirection:"column", gap:16 }}>
      {/* Map card - full width */}
      <div style={{ background:t.card, border:`1px solid ${t.border}`, borderRadius:12, padding:"18px 20px", boxShadow:t.shadow }}>
        <div style={{ fontSize:15, fontWeight:600, color:t.textTitle, marginBottom:3 }}>Geographic Media Reach</div>
        <div style={{ fontSize:13, color:t.textSub, marginBottom:12 }}>
          {cities.length} cities · {Object.keys(stateCounts).length} states · Markers populate in chronological order · Click any marker to expand
        </div>
        {loading && <div style={{ textAlign:"center", padding:"60px 0", color:t.textSub, fontSize:15 }}>Loading map…</div>}
        {err && <div style={{ textAlign:"center", padding:"60px 0", color:t.textSub, fontSize:15 }}>Map unavailable - see states below</div>}
        <svg ref={svgRef} viewBox="0 0 600 360" style={{ width:"75%", display:loading||err?"none":"block", margin:"0 auto" }} />
        {selCity && selCityItems.length > 0 && (
          <div style={{ marginTop:12, padding:"10px 14px", background:t.accentGlow, borderRadius:8, border:`1px solid ${t.border}` }}>
            <div style={{ fontSize:13, fontWeight:700, color:t.accent, marginBottom:8 }}>
              {cityMap[selCity]?.city} - {selCityItems.length} appearance{selCityItems.length>1?"s":""}
            </div>
            {selCityItems.map(m => (
              <div key={m.id} style={{ fontSize:13, color:t.text, padding:"3px 0 3px 10px", borderLeft:`2px solid ${t.accent}`, marginBottom:3, lineHeight:1.4 }}>
                <span style={{ fontWeight:600, color:t.textSub }}>{m.date.slice(5,7)}/{m.date.slice(0,4)}</span> · {m.title}
              </div>
            ))}
          </div>
        )}
      </div>

      {/* States panel - full width, two-column grid */}
      <div style={{ background:t.card, border:`1px solid ${t.border}`, borderRadius:12, padding:"16px 20px", boxShadow:t.shadow }}>
        <div style={{ fontSize:15, fontWeight:600, color:t.textTitle, marginBottom:3 }}>States &amp; Appearances</div>
        <div style={{ fontSize:13, color:t.textSub, marginBottom:14 }}>Click any state to see dates and details</div>
        <div style={{ columns:"2", columnGap:24 }}>
          {Object.entries(stateCounts).sort((a,b) => b[1]-a[1]).map(([ab, n]) => {
            const stateEntries = data.filter(m => {
              const c = (m.city||"").toLowerCase();
              if (ab==="DC") return c.includes("washington, d");
              if (ab==="NY") return c.includes(", ny")||c.includes("new york")||c.includes("binghamton");
              if (ab==="FL") return c.includes(", fl")||c.includes("tallahassee")||c.includes("tampa");
              if (ab==="MA") return c.includes(", ma")||c.includes("boston");
              if (ab==="IL") return c.includes(", il")||c.includes("chicago");
              if (ab==="NV") return c.includes(", nv")||c.includes("las vegas");
              if (ab==="TN") return c.includes(", tn")||c.includes("nashville");
              if (ab==="CA") return c.includes(", ca")||c.includes("los angeles")||c.includes("sacramento")||c.includes("san francisco")||c.includes("palo alto");
              if (ab==="WI") return c.includes(", wi")||c.includes("milwaukee")||c.includes("madison");
              if (ab==="OH") return c.includes(", oh")||c.includes("columbus")||c.includes("dayton")||c.includes("cincinnati");
              if (ab==="KY") return c.includes(", ky")||c.includes("louisville");
              if (ab==="MO") return c.includes(", mo")||c.includes("kansas city");
              if (ab==="GA") return c.includes(", ga")||c.includes("atlanta");
              if (ab==="WA") return c.includes(", wa")||c.includes("seattle");
              if (ab==="TX") return c.includes(", tx")||c.includes("austin")||c.includes("el paso");
              if (ab==="LA") return c.includes(", la")||c.includes("new orleans")||c.includes("monroe");
              if (ab==="CO") return c.includes(", co")||c.includes("grand junction");
              if (ab==="AZ") return c.includes(", az")||c.includes("phoenix")||c.includes("tucson");
              if (ab==="IN") return c.includes(", in")||c.includes("indianapolis");
              if (ab==="UT") return c.includes(", ut")||c.includes("salt lake");
              if (ab==="VA") return c.includes(", va")||c.includes("alexandria");
              if (ab==="PA") return c.includes(", pa")||c.includes("williamsport");
              return false;
            }).sort((a,b) => new Date(b.date)-new Date(a.date));

            const open = selCity === ab;
            return (
              <div key={ab} style={{ breakInside:"avoid" }}>
                <button onClick={() => setSelCity(s => s===ab ? null : ab)} style={{
                  width:"100%", textAlign:"left", background:"transparent", border:"none",
                  padding:"7px 0", cursor:"pointer", borderBottom:`1px solid ${t.border}`,
                  display:"flex", justifyContent:"space-between", alignItems:"center"
                }}>
                  <span style={{ fontSize:14, fontWeight:600, color: open ? t.accent : t.text }}>{ab}</span>
                  <div style={{ display:"flex", alignItems:"center", gap:6 }}>
                    <span style={{ fontSize:12, color: dark ? "#69BE28" : "#69BE28", fontWeight:700 }}>{n}</span>
                    <span style={{ fontSize:11, color:t.textMuted, display:"inline-block", transition:"transform .15s", transform: open?"rotate(180deg)":"none" }}>▾</span>
                  </div>
                </button>
                {open && (
                  <div style={{ padding:"6px 0 10px" }}>
                    {stateEntries.map(m => (
                      <div key={m.id} style={{ fontSize:12, padding:"4px 0 4px 10px", borderLeft:`2px solid ${t.accent}`, marginBottom:3, lineHeight:1.5 }}>
                        <div style={{ color:t.textSub, marginBottom:1 }}>{m.date.slice(5,7)}/{m.date.slice(0,4)}</div>
                        {m.url
                          ? <a href={m.url} target="_blank" rel="noreferrer"
                              style={{ color:t.accent, textDecoration:"none", fontWeight:500 }}
                              onMouseEnter={e => e.target.style.textDecoration="underline"}
                              onMouseLeave={e => e.target.style.textDecoration="none"}>
                              {m.title.length > 50 ? m.title.slice(0,50)+"…" : m.title}
                            </a>
                          : <span style={{ color:t.text }}>{m.title.length > 50 ? m.title.slice(0,50)+"…" : m.title}</span>
                        }
                      </div>
                    ))}
                  </div>
                )}
              </div>
            );
          })}
        </div>
      </div>
    </div>

  // ── COUNT-UP HOOK ──────────────────────────────────────────────────────────
  const useCountUp = (target, duration = 900) => {
    const [val, setVal] = useState(0);
    const str = String(target);
    const hasCommas = str.includes(",");
    const num = parseFloat(str.replace(/[^0-9.]/g, ""));
    const suffix = str.replace(/[0-9.,]/g, "");
    useEffect(() => {
      if (!num) { setVal(0); return; }
      let start = null;
      const step = (ts) => {
        if (!start) start = ts;
        const p = Math.min((ts - start) / duration, 1);
        const ease = 1 - Math.pow(1 - p, 3);
        setVal(Math.round(ease * num));
        if (p < 1) requestAnimationFrame(step);
      };
      requestAnimationFrame(step);
    }, [num]);
    return (hasCommas ? val.toLocaleString() : val) + suffix;

          <div style={{ fontSize:15, color:t.accent, fontWeight:600, marginBottom:14 }}>{selected.outlet}</div>
          <div style={{ display:"flex", gap:16, marginBottom:14, fontSize:14, color:t.textSub, flexWrap:"wrap" }}>
            <span style={{ display:"flex", gap:5, alignItems:"center" }}><Icon name="clock" size={12}/>{(d => `${d.slice(8,10)}-${["JAN","FEB","MAR","APR","MAY","JUN","JUL","AUG","SEP","OCT","NOV","DEC"][parseInt(d.slice(5,7))-1]}-${d.slice(0,4)}`)(selected.date)}</span>
            {selected.city && <span style={{ display:"flex", gap:5, alignItems:"center" }}><Icon name="pin" size={12}/>{selected.city}</span>}
          </div>
          <div style={{ fontSize:15, color:t.text, lineHeight:1.8, padding:"14px 16px", background:t.surfaceAlt, borderRadius:10, border:`1px solid ${t.border}`, marginBottom:16 }}>{selected.description}</div>
          {selected.url && selected.url !== "" ? (
            <a href={selected.url} target="_blank" rel="noopener noreferrer" style={{ textDecoration:"none" }}>
              <div style={{ display:"inline-flex", alignItems:"center", gap:6, padding:"8px 14px", borderRadius:7, background:t.accentGlow, border:`1px solid ${t.border}`, fontSize:14, fontWeight:600, cursor:"pointer" }}>
                <span style={{ color: dark ? "#FFFFFF" : "#1B3A6B", display:"inline-flex" }}><Icon name="link" size={12}/></span>
                <span style={{ color:"#69BE28" }}>View Source</span>
              </div>
            </a>
          ) : (
            <div style={{ fontSize:13, color:t.textMuted, fontStyle:"italic" }}>Direct URL: [TBD - review Drive subfolder for source link]</div>
          )}
        </div>
      </div>
    );
  };

  const tabs = [
    { id:"dashboard", label:"Dashboard" }, { id:"library", label:"Library" },
    { id:"timeline", label:"Timeline" }, { id:"map", label:"Outreach" },
    { id:"highlights", label:"Highlights" },
  ];

  if (!mounted) return null;
  return (
    <div style={{ fontFamily:"'DM Sans',system-ui,sans-serif", background:t.bg, minHeight:"100vh", color:t.text, transition:"background 0.3s,color 0.3s" }}>
      <style>{`@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=DM+Sans:wght@400;500;600;700;800&display=swap');*{box-sizing:border-box;margin:0;padding:0}::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:${t.border};border-radius:3px}`}</style>

      {/* HEADER */}
      <div style={{ background:t.surface, borderBottom:`1px solid ${t.border}`, position:"sticky", top:0, zIndex:100, boxShadow:t.shadow }}>
        <div style={{ maxWidth:1200, margin:"0 auto", padding:"0 24px", display:"flex", alignItems:"center", justifyContent:"space-between", height:66 }}>
          {/* Headshot */}
          <div style={{ width:48, height:48, borderRadius:8, overflow:"hidden", flexShrink:0, border:`2px solid ${dark ? "rgba(255,255,255,0.18)" : "rgba(255,255,255,0.9)"}`, boxShadow: dark ? "0 0 0 1px rgba(88,153,204,0.35)" : "0 0 0 1px #C0CCD8" }}>
            <img src={`data:image/jpeg;base64,${HEADSHOT}`} alt="Dr. Shairi Turner" style={{ width:"100%", height:"100%", objectFit:"cover" }} />
          </div>

          {/* NAV */}
          <nav style={{ display:"flex", gap:3, background: t.navBg, padding:"5px 6px", borderRadius:8, border:`1px solid ${t.border}` }}>
            {tabs.map(({ id, label }) => (
              <button key={id} style={tabPill(id)} onClick={() => setTab(id)}>{label}</button>
            ))}
          </nav>

          {/* Gear toggle */}
          <button style={{ width:36, height:36, borderRadius:8, border:`1px solid ${t.border}`, background:t.surfaceAlt, color:t.textSub, cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center", transition:"all 0.2s" }} onClick={() => setDark(d => !d)} title={dark ? "Switch to light mode" : "Switch to dark mode"}>
            <Icon name="gear" size={15}/>
          </button>
        </div>
      </div>

      {/* CONTENT */}
      <div style={{ padding:"24px", maxWidth:1200, margin:"0 auto" }}>
        {tab==="dashboard"  && <Dashboard />}
        {tab==="library"    && <Library />}
        {tab==="timeline"   && <Timeline />}
        {tab==="map"        && <USMap dark={dark} t={t} data={MEDIA_DATA} />}
        {tab==="highlights" && <Highlights />}
      </div>

      <Modal />

      <div style={{ textAlign:"center", padding:"16px", fontSize:12, color:t.textMuted, borderTop:`1px solid ${t.border}` }}>
        {`Dr. Turner Media Tracker v7 · ${STATS.total} verified catalogued entries · 216+ total estimated including undocumented H1 2022 regional appearances · Data: Google Drive + Web Research + LF999 Final Airings Report · Updated April 8, 2026`}
      </div>
    </div>
  );
}


ReactDOM.render(React.createElement(DrTurnerMediaTracker), document.getElementById("root"));
</script>
</body>
</html>
